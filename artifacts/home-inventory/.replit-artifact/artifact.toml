kind = "web"
previewPath = "/"
title = "Home Inventory"
version = "1.0.0"
id = "artifacts/home-inventory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23298

[services.development]
run = "pnpm --filter @workspace/home-inventory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/home-inventory", "run", "build" ]
publicDir = "artifacts/home-inventory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23298"
BASE_PATH = "/"
